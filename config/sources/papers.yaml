schema_version: 1
sources:
- id: arxiv-cs-ai
  title: arXiv cs.AI
  kind: paper
  platform: arxiv
  homepage: https://arxiv.org/list/cs.AI/recent
  language: en
  tags:
  - paper
  - ai
  group: Papers
  priority: 100
  fetch:
    strategy: first_success
    interval_seconds: 3600
    attempts:
    - adapter: feed
      url: https://export.arxiv.org/api/query?search_query=cat:cs.AI&sortBy=submittedDate&sortOrder=descending&max_results=50
      route: ''
      timeout_seconds: 20
      selectors: []
      limit: 20
  fulltext:
    mode: feed_only
    min_feed_chars: 1200
    max_detail_pages_per_run: 20
    selectors: []
    remove_selectors: []
    min_detail_chars: 200
  summary:
    auto: true
    window_days: 7
  tagging:
    mode: feed
    max_tags: 5
  filters:
    include_keywords: []
    exclude_keywords: []
  auth:
    mode: none
    secret_ref: ''
  stability: stable
