    language: en
    tags: [arize, ai, evals]
    fetch:
      strategy: first_success
      interval_seconds: 3600
      attempts:
        - adapter: feed
          url: https://arize.com/feed/
    fulltext:
      mode: feed_then_detail
      min_feed_chars: 1200
