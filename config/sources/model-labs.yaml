schema_version: 1
sources:
  - id: openai-news
    title: OpenAI News
    kind: blog
    platform: openai
    homepage: https://openai.com/news/
    group: Model Labs
    language: en
    tags: [openai]
    fetch:
      strategy: first_success
      interval_seconds: 3600
      attempts:
        - adapter: rsshub
          route: /openai/news?limit=20
          timeout_seconds: 12
    fulltext:
      mode: feed_only
    summary:
      auto: true
      window_days: 7
    auth:
      mode: none
  - id: openai-research
    title: OpenAI Research
    kind: blog
    platform: openai
    homepage: https://openai.com/research/
    group: Model Labs
    language: en
    tags: [openai, research]
    fetch:
      strategy: first_success
      interval_seconds: 3600
      attempts:
        - adapter: page_index
          url: https://openai.com/research/
          timeout_seconds: 20
          limit: 20
          reader_fallback: true
        - adapter: rsshub
          route: /openai/research?limit=20
          timeout_seconds: 12
    fulltext:
      mode: feed_then_detail
      min_feed_chars: 1200
      max_detail_pages_per_run: 20
    summary:
      auto: true
      window_days: 7
    auth:
      mode: none
