schema_version: 1
sources:
  - id: mit-technology-review-ai
    title: MIT Technology Review AI
    kind: blog
    platform: mit-technology-review
    homepage: https://www.technologyreview.com/topic/artificial-intelligence/
    group: Tech Media
    language: en
    tags: [media, ai]
    fetch:
      strategy: first_success
      interval_seconds: 3600
      attempts:
        - adapter: feed
          url: https://www.technologyreview.com/topic/artificial-intelligence/feed/
    fulltext:
      mode: feed_then_detail
      min_feed_chars: 1200
      max_detail_pages_per_run: 20
    summary:
      auto: true
      window_days: 7
    auth:
      mode: none
