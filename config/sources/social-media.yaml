schema_version: 1
sources:
  - id: x-thsottiaux
    title: X - Tibo
    kind: post
    platform: x
    homepage: https://x.com/thsottiaux
    group: Social Media
    language: en
    tags: [x, ai]
    fetch:
      strategy: first_success
      interval_seconds: 1800
      attempts:
        - adapter: x_user
          route: thsottiaux
          limit: 20
          exclude: [retweets, replies]
          timeout_seconds: 20
    fulltext:
      mode: feed_only
    summary:
      auto: true
      window_days: 7
    tagging:
      mode: llm
      max_tags: 5
    auth:
      mode: bearer
      secret_ref: X_BEARER_TOKEN
    stability: stable
