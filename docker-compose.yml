services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/daily-info.db}
    ports:
      - "8000:8000"
    volumes:
      - daily_info_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    command: ["python", "-m", "app.worker"]
    volumes:
      - daily_info_data:/data
    depends_on:
      api:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    command: ["python", "-m", "app.scheduler"]
    volumes:
      - daily_info_data:/data
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  rsshub:
    image: diygod/rsshub:latest
    profiles: ["rsshub"]
    ports:
      - "1200:1200"

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: daily_info
      POSTGRES_USER: daily_info
      POSTGRES_PASSWORD: daily_info
    volumes:
      - daily_info_pg:/var/lib/postgresql/data

volumes:
  daily_info_data:
  daily_info_pg:
